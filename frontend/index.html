<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DIZELTRADE">
<link rel="manifest" href="/manifest.json">
<title>DIZELTRADE</title>
<style>
/* ── Reset ──────────────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ── Design tokens (mobile-first from mockup) ───────────────────────────── */
:root{
  --bg:#111;--card:#1c1c1e;--card2:#242426;--card3:#2c2c2e;
  --accent:#c8ff00;--accent-dim:rgba(200,255,0,.12);--accent-mid:rgba(200,255,0,.2);
  --text:#fff;--text2:#8e8e93;--text3:#48484a;
  --border:#2c2c2e;--border2:#3a3a3c;
  --red:#ff453a;--green:#32d74b;--orange:#ff9f0a;--blue:#0a84ff;--purple:#bf5af2;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:#0a0a0a;color:var(--text)}
body{display:flex;flex-direction:column;min-height:100vh}

/* ── App root ──────────────────────────────────────────────────────────── */
#app{flex:1;display:flex;flex-direction:column}

/* ── LOGIN SCREEN ─────────────────────────────────────────────────────── */
.login-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;background:#0a0a0a;
}
.login-card{
  width:100%;max-width:390px;background:var(--card);
  border-radius:24px;padding:32px 24px;
  border:1px solid var(--border2);
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.login-logo{font-size:32px;font-weight:900;letter-spacing:-1px;text-align:center;margin-bottom:6px}
.login-logo span{color:var(--accent)}
.login-sub{text-align:center;font-size:14px;color:var(--text2);margin-bottom:28px}
.login-err{background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.25);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px}
.inp-err{border-color:var(--red)!important}

/* ── STATUS BAR ──────────────────────────────────────────────────────── */
.status-bar{display:none}

/* ── NAV BARS ─────────────────────────────────────────────────────────── */
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 12px;border-bottom:1px solid var(--border)}
.nav-logo{font-size:18px;font-weight:900;letter-spacing:-.5px;color:var(--text)}
.nav-logo span{color:var(--accent)}
.nav-user{font-size:12px;color:var(--text2);background:var(--card);padding:4px 10px;border-radius:20px}
.nav-back{display:flex;align-items:center;color:var(--accent);font-size:15px;cursor:pointer}
.nav-back::before{content:'‹';font-size:22px;margin-right:3px;line-height:1}
.nav-title{font-size:16px;font-weight:700;color:var(--text)}

/* ── CONTENT ─────────────────────────────────────────────────────────── */
.content{flex:1;padding:18px 16px;overflow-y:auto;scrollbar-width:none;padding-bottom:80px}
.content::-webkit-scrollbar{display:none}

/* ── SCREEN TITLES ────────────────────────────────────────────────────── */
.stitle{font-size:26px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-.5px}
.ssub{font-size:13px;color:var(--text2);margin-bottom:18px}

/* ── ROLE TAG ─────────────────────────────────────────────────────────── */
.role-tag{
  background:var(--accent-dim);border:1px solid rgba(200,255,0,.15);
  border-radius:10px;padding:8px 12px;margin-bottom:14px;
  font-size:12px;color:var(--accent);display:flex;align-items:center;gap:6px;
}
.role-tag.orange{background:rgba(255,149,0,.1);border-color:rgba(255,149,0,.2);color:var(--orange)}
.role-tag.blue{background:rgba(10,132,255,.1);border-color:rgba(10,132,255,.2);color:var(--blue)}

/* ── ALERT BANNER ─────────────────────────────────────────────────────── */
.alert-banner{
  background:rgba(255,149,0,.12);border:1px solid rgba(255,149,0,.25);
  border-radius:12px;padding:11px 14px;margin-bottom:14px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
}
.alert-banner .ai{font-size:18px}
.alert-banner .at{flex:1}
.alert-banner .at .h{font-size:13px;font-weight:600;color:var(--orange)}
.alert-banner .at .s{font-size:12px;color:var(--text2);margin-top:2px}

/* ── MENU GRID ────────────────────────────────────────────────────────── */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mc{
  background:var(--card);border-radius:16px;padding:16px 14px;
  cursor:pointer;border:1px solid var(--border);transition:transform .15s;
  position:relative;overflow:hidden;
}
.mc:active{transform:scale(.97)}
.mc.accent{background:var(--accent-dim);border-color:rgba(200,255,0,.2)}
.mc.wide{grid-column:span 2}
.mc .i{font-size:26px;margin-bottom:8px;display:block}
.mc .l{font-size:14px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.2px}
.mc .sl{font-size:11px;color:var(--text2);margin-top:2px}
.mc .b{
  position:absolute;top:10px;right:10px;
  background:var(--orange);color:#000;font-size:10px;font-weight:800;
  min-width:18px;height:18px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
}

/* ── SECTION HEADER ──────────────────────────────────────────────────── */
.sh{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:18px 0 9px}

/* ── STATS ROW ───────────────────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.sc{background:var(--card);border-radius:13px;padding:12px 10px;border:1px solid var(--border);text-align:center}
.sc .v{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.sc .v.a{color:var(--accent)}
.sc .v.o{color:var(--orange)}
.sc .v.r{color:var(--red)}
.sc .v.g{color:var(--green)}
.sc .lv{font-size:10px;color:var(--text2);margin-top:3px;line-height:1.3}

/* ── BIG STAT ────────────────────────────────────────────────────────── */
.big-stat{background:var(--card);border-radius:18px;padding:18px;margin-bottom:12px;border:1px solid var(--border)}
.big-stat .bl{font-size:12px;color:var(--text2);margin-bottom:5px}
.big-stat .bv{font-size:44px;font-weight:900;color:var(--accent);letter-spacing:-2px;line-height:1}
.big-stat .bu{font-size:18px;color:var(--text2);font-weight:400}
.big-stat .bs{font-size:12px;color:var(--text2);margin-top:6px}

/* ── PROGRESS ────────────────────────────────────────────────────────── */
.pi{background:var(--card);border-radius:13px;padding:13px 14px;margin-bottom:7px;border:1px solid var(--border)}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.pn{font-size:13px;font-weight:600;color:var(--text)}
.pv{font-size:12px;color:var(--text2)}
.pb{background:var(--card2);border-radius:5px;height:7px;overflow:hidden}
.pf{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),#90ff00)}
.pf.o{background:linear-gradient(90deg,var(--orange),#ffcc00)}
.pf.r{background:linear-gradient(90deg,var(--red),#ff8080)}

/* ── PENDING BLOCK ───────────────────────────────────────────────────── */
.pending-block{background:rgba(255,149,0,.07);border:1px solid rgba(255,149,0,.18);border-radius:14px;padding:14px;margin-bottom:14px}
.pt{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:9px}
.pr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,149,0,.1)}
.pr:last-child{border:none;padding-bottom:0}
.pr .prt{font-size:13px;color:var(--text)}
.pr .prs{font-size:11px;color:var(--text2);margin-top:1px}
.prb{background:var(--orange);color:#000;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pr .prb{margin-left:8px}

/* ── FORM ────────────────────────────────────────────────────────────── */
.fsec{margin-bottom:18px}
.fl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{background:var(--card);border:1px solid var(--border2);border-radius:9px;padding:7px 13px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.chip.sel{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.chip:hover:not(.sel){border-color:var(--border);color:var(--text)}
.inp{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px 14px;width:100%;font-size:16px;color:var(--text);outline:none;font-family:inherit}
.inp::placeholder{color:var(--text3)}
.inp:focus{border-color:var(--accent)}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.photo-btn{display:block;background:var(--card);border:2px dashed var(--border);border-radius:13px;padding:18px;text-align:center;cursor:pointer}
.photo-btn:active{border-color:var(--accent);background:var(--accent-dim)}
.photo-btn .pi2{font-size:26px;margin-bottom:5px}
.photo-btn .pt2{font-size:13px;color:var(--text2)}
.photo-btn .ps{font-size:11px;color:var(--text3);margin-top:3px}

/* ── AUTO CALC ───────────────────────────────────────────────────────── */
.auto-calc{background:var(--accent-dim);border:1px solid rgba(200,255,0,.2);border-radius:9px;padding:9px 12px;font-size:12px;color:var(--accent);margin-top:7px}

/* ── TARIFF BOX ──────────────────────────────────────────────────────── */
.tariff-box{background:var(--card);border-radius:13px;padding:13px 14px;border:1px solid var(--border);margin-bottom:18px}
.tariff-label{font-size:12px;color:var(--text2);margin-bottom:3px}
.tariff-val{font-size:26px;font-weight:900;color:var(--accent);letter-spacing:-.5px}

/* ── BUTTONS ─────────────────────────────────────────────────────────── */
.btn-primary{background:var(--accent);color:#000;border:none;border-radius:13px;padding:17px;width:100%;font-size:17px;font-weight:800;cursor:pointer;margin-top:8px;transition:transform .15s,opacity .15s}
.btn-primary:active{transform:scale(.98)}
.btn-primary:hover{opacity:.92}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:13px;padding:15px;width:100%;font-size:15px;font-weight:600;cursor:pointer;margin-top:7px}
.btn-secondary:hover{background:var(--card2)}

/* ── LIST ITEMS ──────────────────────────────────────────────────────── */
.li{background:var(--card);border-radius:13px;padding:12px 14px;margin-bottom:7px;border:1px solid var(--border);display:flex;align-items:center;gap:11px;cursor:pointer}
.lic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.lic.g{background:rgba(50,215,75,.14)}
.lic.o{background:rgba(255,149,0,.14)}
.lic.b{background:rgba(10,132,255,.14)}
.lic.y{background:rgba(200,255,0,.12)}
.lic.tr{background:rgba(10,132,255,.14)}
.lit{flex:1;min-width:0}
.lim{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lis{font-size:12px;color:var(--text2);margin-top:2px}
.lir{text-align:right;flex-shrink:0}
.lival{font-size:14px;font-weight:700;color:var(--text)}

/* ── BADGE ───────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge.transit{background:rgba(10,132,255,.14);color:var(--blue)}
.badge.done{background:rgba(50,215,75,.12);color:var(--green)}
.badge.pending{background:rgba(255,149,0,.14);color:var(--orange)}
.badge.cancelled{background:rgba(255,69,58,.12);color:var(--red)}
.badge.accent{background:var(--accent-dim);color:var(--accent)}

/* ── ORDER CARD ──────────────────────────────────────────────────────── */
.oc{background:var(--card);border-radius:16px;padding:16px;margin-bottom:11px;border:1px solid var(--border)}
.och{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px}
.ocn{font-size:16px;font-weight:800;color:var(--text)}
.ocd{font-size:11px;color:var(--text2);margin-top:2px}
.oca{font-size:15px;font-weight:800;color:var(--accent);text-align:right}
.ocsub{font-size:11px;color:var(--text2);text-align:right;margin-top:1px}
.ocp-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:7px}
.ocp-labels strong{color:var(--text)}
.ocbar{background:var(--card2);border-radius:6px;height:9px;overflow:hidden;margin-bottom:8px}
.ocfill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),#90ff00)}
.ocfill.o{background:linear-gradient(90deg,var(--orange),#ffcc00)}
.oc-sites{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.oc-site{background:var(--card2);border-radius:7px;padding:3px 9px;font-size:11px;color:var(--text2)}

/* ── BALANCE BOX ─────────────────────────────────────────────────────── */
.bb{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:11px}
.bbr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.bbr:last-child{border:none}
.bbl{font-size:13px;color:var(--text2)}
.bbv{font-size:14px;font-weight:700;color:var(--text)}
.bbt{display:flex;justify-content:space-between;font-size:15px;font-weight:700;padding-top:10px;margin-top:3px}

/* ── CONFIRM OVERLAY ─────────────────────────────────────────────────── */
.conf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;padding:14px;z-index:200;animation:fadeIn .2s}
.conf-sheet{background:#1c1c1e;border-radius:18px;padding:18px;width:100%;border:1px solid var(--border)}
.conf-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:5px}
.conf-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.conf-row{display:flex;gap:8px}
.conf-cancel{flex:1;padding:15px;background:var(--card2);border:none;border-radius:11px;color:var(--text);font-size:15px;font-weight:600;cursor:pointer}
.conf-ok{flex:1.5;padding:15px;background:var(--accent);border:none;border-radius:11px;color:#000;font-size:15px;font-weight:800;cursor:pointer}

/* ── TAB BAR ─────────────────────────────────────────────────────────── */
.tab-bar{
  display:flex;background:rgba(28,28,30,.97);
  border-top:1px solid var(--border);padding:6px 0 22px;
  position:sticky;bottom:0;z-index:50;
}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 0}
.tab-icon{font-size:21px}
.tab-label{font-size:9px;font-weight:600;color:var(--text2)}
.tab-item.active .tab-label{color:var(--accent)}

/* ── SUB TABS ────────────────────────────────────────────────────────── */
.sub-tabs{display:flex;gap:0;margin-bottom:16px;background:var(--card2);border-radius:10px;padding:3px;overflow-x:auto}
.sub-tab{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap}
.sub-tab.active{background:var(--accent);color:#000}
.sub-tab:hover:not(.active){color:var(--text)}

/* ── DIVIDER ─────────────────────────────────────────────────────────── */
.div{height:1px;background:var(--border);margin:14px 0}

/* ── INFO TAG ────────────────────────────────────────────────────────── */
.info-tag{background:var(--accent-dim);border:1px solid rgba(200,255,0,.15);border-radius:9px;padding:8px 12px;font-size:12px;color:var(--accent);margin-bottom:14px}

/* ── RT BADGE ────────────────────────────────────────────────────────── */
.rt-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(50,215,75,.1);border:1px solid rgba(50,215,75,.2);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--green);font-weight:600}
.rt-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── EMPTY STATE ─────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:32px 16px;color:var(--text2);font-size:14px}

/* ── SPINNER ─────────────────────────────────────────────────────────── */
.spinner-wrap{display:flex;justify-content:center;align-items:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ───────────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);border:1px solid var(--border2);border-radius:12px;
  padding:12px 20px;font-size:14px;font-weight:600;color:var(--text);
  z-index:1000;opacity:0;transition:all .25s ease;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.toast.toast-show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.toast-error{border-color:rgba(255,69,58,.4);color:var(--red)}
.toast.toast-success{border-color:rgba(200,255,0,.3);color:var(--accent)}

/* ── MODAL ───────────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:500;padding:0;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{
  background:#1c1c1e;border:1px solid var(--border2);
  border-radius:22px 22px 0 0;
  padding:24px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;
}
.modal-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px}
.modal-body .fsec{margin-bottom:14px}
.modal-footer-btns{display:flex;gap:10px;margin-top:18px}
.modal-footer-btns .btn-secondary{margin-top:0}
.modal-footer-btns .btn-primary{margin-top:0;flex:2}

/* ── APP SHELL (mobile) ──────────────────────────────────────────────── */
.app-shell{display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}

/* ══════════════════════════════════════════════════════════════════════
   DESKTOP LAYOUT (≥ 768px)
══════════════════════════════════════════════════════════════════════ */
@media (min-width:768px) {
  body{display:flex;background:#0a0a0a;padding:0;overflow:hidden;height:100vh}
  #app{flex:1;display:flex;height:100vh;overflow:hidden}

  /* App shell becomes flex row */
  .app-shell{flex-direction:row;height:100vh;overflow:hidden;background:#0a0a0a;width:100%}

  /* ── SIDEBAR ────────────────────────────────────────────────────── */
  .sidebar{
    width:220px;flex-shrink:0;
    background:#111113;
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  .sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
  .sidebar-logo .logo{font-size:18px;font-weight:900;letter-spacing:-.5px;color:var(--text)}
  .sidebar-logo .logo span{color:var(--accent)}
  .sidebar-logo .version{font-size:11px;color:var(--text3);margin-top:2px}
  .sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
  .nav-group-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;padding:12px 12px 6px}
  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 12px;border-radius:9px;
    font-size:14px;font-weight:500;color:var(--text2);
    cursor:pointer;transition:all .15s;
    position:relative;margin-bottom:2px;user-select:none;
  }
  .nav-item:hover{background:var(--card2);color:var(--text)}
  .nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
  .nav-item.nav-item-dim{opacity:.45;cursor:default}
  .nav-item.nav-item-dim:hover{background:transparent;color:var(--text2)}
  .ni-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
  .ni-badge{
    margin-left:auto;background:var(--orange);color:#000;
    font-size:10px;font-weight:800;
    min-width:18px;height:18px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;padding:0 4px;
  }
  .sidebar-user{
    padding:14px 16px;border-top:1px solid var(--border);
    display:flex;align-items:center;gap:10px;
  }
  .user-avatar{
    width:32px;height:32px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#60c800);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:800;color:#000;flex-shrink:0;
  }
  .user-name{font-size:13px;font-weight:600;color:var(--text)}
  .user-role{font-size:11px;color:var(--text2)}
  .btn-logout-sidebar{
    margin-left:auto;background:none;border:1px solid var(--border);
    border-radius:7px;padding:4px 8px;color:var(--text2);cursor:pointer;font-size:14px;
  }
  .btn-logout-sidebar:hover{border-color:var(--red);color:var(--red)}

  /* ── MAIN AREA ──────────────────────────────────────────────────── */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

  /* ── TOPBAR ─────────────────────────────────────────────────────── */
  .topbar{
    height:56px;flex-shrink:0;
    background:#111113;border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 24px;gap:16px;
  }
  .topbar-title{font-size:17px;font-weight:700;color:var(--text);flex:1}
  .topbar-stat{
    display:flex;align-items:center;gap:8px;
    background:var(--card);border:1px solid var(--border);
    border-radius:10px;padding:7px 14px;cursor:default;
  }
  .ts-val{font-size:15px;font-weight:800;color:var(--accent)}
  .ts-lbl{font-size:12px;color:var(--text2)}
  .ts-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
  .topbar-alert{
    display:flex;align-items:center;gap:7px;
    background:rgba(255,149,0,.12);border:1px solid rgba(255,149,0,.25);
    border-radius:10px;padding:7px 14px;cursor:pointer;
    font-size:13px;color:var(--orange);font-weight:600;
    transition:background .15s;
  }
  .topbar-alert:hover{background:rgba(255,149,0,.2)}

  /* ── CONTENT AREA ───────────────────────────────────────────────── */
  #content{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
  #content::-webkit-scrollbar{width:5px}
  #content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  .content{padding:24px;padding-bottom:24px}
  .form-content{max-width:100%}

  /* ── HIDE MOBILE-ONLY ELEMENTS ──────────────────────────────────── */
  .tab-bar{display:none}
  .status-bar{display:none}
  .nav-bar{display:none}

  /* ── DESKTOP GRIDS ──────────────────────────────────────────────── */
  .menu-grid{grid-template-columns:repeat(3,1fr);gap:14px}
  .stats{grid-template-columns:repeat(4,1fr);gap:12px}
  .mc{padding:18px 16px}
  .mc.wide{grid-column:span 3}

  /* ── MODAL DESKTOP ──────────────────────────────────────────────── */
  .modal-overlay{align-items:center;padding:20px}
  .modal-sheet{border-radius:20px;padding:28px;max-height:85vh}

  /* ── TOAST DESKTOP ──────────────────────────────────────────────── */
  .toast{bottom:24px}

  /* ── TABLE STYLES ────────────────────────────────────────────────── */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  thead th{
    font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;
    font-weight:600;padding:10px 14px;border-bottom:1px solid var(--border);
    text-align:left;white-space:nowrap;
  }
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--card2)}
  tbody td{padding:12px 14px;font-size:14px;vertical-align:middle;color:var(--text)}
  .td-sub{font-size:12px;color:var(--text2);margin-top:2px}

  /* Adjust pending block on desktop */
  .pending-block{max-width:100%}
  .sub-tabs{margin-bottom:20px}

  /* Conf overlay on desktop */
  .conf-overlay{align-items:center}
  .conf-sheet{max-width:480px;border-radius:18px}
}

/* ══════════════════════════════════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════════════════════════════════ */
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.content > *{animation:pageIn .2s ease}

/* ── Phase 3 enhancements ─────────────────────────────────────────────── */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:80px;margin:14px 0;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{width:100%;border-radius:4px 4px 0 0;background:var(--accent);opacity:.7;transition:height .4s ease;min-height:4px}
.bar-fill.current{opacity:1;box-shadow:0 0 12px rgba(200,255,0,.35);border:1px solid var(--accent)}
.bar-label{font-size:9px;color:var(--text2);white-space:nowrap}
.bar-val{font-size:9px;color:var(--text2);margin-bottom:2px}

.prog-mini-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.prog-mini-label{font-size:12px;color:var(--text);width:140px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-mini-bar{flex:1;background:var(--card2);border-radius:4px;height:6px;overflow:hidden}
.prog-mini-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),#90ff00);transition:width .5s ease}
.prog-mini-fill.o{background:linear-gradient(90deg,var(--orange),#ffcc00)}
.prog-mini-val{font-size:12px;color:var(--text2);width:55px;text-align:right;flex-shrink:0}

.month-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin-bottom:14px;scrollbar-width:none}
.month-tabs::-webkit-scrollbar{display:none}
.month-tab{padding:5px 10px;border-radius:7px;font-size:11px;border:1px solid var(--border);cursor:pointer;color:var(--text2);background:var(--card);white-space:nowrap;flex-shrink:0}
.month-tab.active{background:var(--accent);color:#000;font-weight:700;border-color:var(--accent)}

.year-tabs{display:flex;gap:6px;margin-bottom:14px}
.year-tab{padding:5px 14px;border-radius:7px;font-size:13px;border:1px solid var(--border);cursor:pointer;color:var(--text2);background:var(--card)}
.year-tab.active{background:var(--accent);color:#000;font-weight:700;border-color:var(--accent)}

.concentration-warning{background:rgba(255,149,0,.08);border:1px solid rgba(255,149,0,.15);border-radius:8px;padding:9px 12px;margin-top:10px;font-size:11px;color:var(--orange)}
</style>
</head>
<body>
<div id="app"></div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
