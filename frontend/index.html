<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DIZELTRADE">
  <link rel="manifest" href="/manifest.json">
  <title>DIZELTRADE</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --bg: #111;
      --card: #1c1c1e;
      --card2: #242426;
      --card3: #2c2c2e;
      --accent: #c8ff00;
      --accent-dim: rgba(200, 255, 0, 0.12);
      --accent-mid: rgba(200, 255, 0, 0.20);
      --text: #fff;
      --text2: #8e8e93;
      --text3: #48484a;
      --border: #2c2c2e;
      --border2: #3a3a3c;
      --red: #ff453a;
      --green: #32d74b;
      --orange: #ff9f0a;
      --blue: #0a84ff;
      --purple: #bf5af2;
      --sidebar-w: 220px;
      --topbar-h: 56px;
      --tabbar-h: 72px;
    }

    /* ── Reset & base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    input, textarea, select, button {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
    }

    button { cursor: pointer; }

    /* ── App shell ─────────────────────────────────────────────────────────── */
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Scrollbar (desktop) ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Loading spinner ───────────────────────────────────────────────────── */
    .spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      flex-direction: column;
      gap: 12px;
      color: var(--text2);
      font-size: 13px;
    }
    .spinner::before {
      content: '';
      width: 32px;
      height: 32px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Full-page spinner ─────────────────────────────────────────────────── */
    .page-spinner {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 9999;
    }
    .page-spinner::before {
      content: '';
      width: 44px;
      height: 44px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Empty state ───────────────────────────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 48px 24px;
      color: var(--text2);
      font-size: 14px;
      text-align: center;
    }
    .empty-icon { font-size: 36px; margin-bottom: 4px; }

    /* ── Cards ─────────────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--border);
    }
    .card2 {
      background: var(--card2);
      border-radius: 12px;
      padding: 14px 16px;
    }

    /* ── Stat block ────────────────────────────────────────────────────────── */
    .sc {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sc .val {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .sc .lbl {
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sc.accent .val { color: var(--accent); }
    .sc.green .val  { color: var(--green); }
    .sc.orange .val { color: var(--orange); }
    .sc.red .val    { color: var(--red); }
    .sc.blue .val   { color: var(--blue); }

    /* ── Stats row ─────────────────────────────────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 12px;
    }
    .stats-row .sc { flex: 1; }

    /* ── Badges ────────────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      background: var(--accent);
      color: #000;
    }
    .badge.transit  { background: rgba(10,132,255,0.15); color: var(--blue); }
    .badge.done     { background: rgba(50,215,75,0.15);  color: var(--green); }
    .badge.pending  { background: rgba(255,159,10,0.15); color: var(--orange); }
    .badge.cancelled{ background: rgba(255,69,58,0.15);  color: var(--red); }
    .badge.accent   { background: var(--accent-dim);      color: var(--accent); }

    /* ── List items ────────────────────────────────────────────────────────── */
    .li {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .li:last-child { border-bottom: none; }
    .li-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .li-body { flex: 1; min-width: 0; }
    .li-title {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .li-sub {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .li-right { text-align: right; flex-shrink: 0; }
    .li-val { font-size: 15px; font-weight: 600; }
    .li-sub2 { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .list-group {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* ── Progress bar ──────────────────────────────────────────────────────── */
    .progress-wrap {
      height: 6px;
      background: var(--card3);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* ── Buttons ───────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 15px;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-accent  { background: var(--accent); color: #000; }
    .btn-ghost   { background: var(--card2); color: var(--text); border: 1px solid var(--border2); }
    .btn-danger  { background: rgba(255,69,58,0.15); color: var(--red); }
    .btn-green   { background: rgba(50,215,75,0.15); color: var(--green); }
    .btn-sm      { padding: 8px 14px; font-size: 13px; border-radius: 10px; }
    .btn-full    { width: 100%; }
    .btn-icon    { background: var(--card2); border: 1px solid var(--border2); border-radius: 10px; padding: 8px; font-size: 18px; width: 38px; height: 38px; }

    /* ── Inputs / Form ─────────────────────────────────────────────────────── */
    .fsec {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .fsec label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .finput {
      background: var(--card2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    .finput:focus { border-color: var(--accent); }
    .finput::placeholder { color: var(--text3); }

    textarea.finput {
      resize: vertical;
      min-height: 80px;
    }

    /* ── Chips ─────────────────────────────────────────────────────────────── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--card2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .chip:active { opacity: 0.8; }

    /* ── Alert banner ──────────────────────────────────────────────────────── */
    .alert-banner {
      background: rgba(255,159,10,0.12);
      border: 1px solid rgba(255,159,10,0.3);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--orange);
    }
    .alert-banner .ab-icon { font-size: 20px; }

    /* ── Menu grid ─────────────────────────────────────────────────────────── */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .menu-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }
    .menu-card:active { background: var(--card2); }
    .menu-card.accent {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    .menu-card .mc-icon { font-size: 28px; line-height: 1; }
    .menu-card .mc-title {
      font-size: 14px;
      font-weight: 600;
    }
    .menu-card .mc-badge {
      position: absolute;
      top: 12px;
      right: 12px;
    }

    /* ── View container ────────────────────────────────────────────────────── */
    .view {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--tabbar-h) + 16px);
    }

    /* ── Nav bar (mobile view header) ─────────────────────────────────────── */
    .navbar {
      display: flex;
      align-items: center;
      padding: 16px 20px 8px;
      gap: 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .navbar .nav-title {
      flex: 1;
      font-size: 20px;
      font-weight: 700;
    }
    .navbar .nav-back {
      background: var(--card2);
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 500;
    }

    /* ── Sub tabs ──────────────────────────────────────────────────────────── */
    .sub-tabs {
      display: flex;
      gap: 4px;
      padding: 0 20px;
      margin: 12px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .sub-tabs::-webkit-scrollbar { display: none; }
    .sub-tab {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sub-tab.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Section header ────────────────────────────────────────────────────── */
    .sec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      margin-bottom: 8px;
    }
    .sec-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── View content padding ──────────────────────────────────────────────── */
    .view-content {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Tab bar (mobile) ──────────────────────────────────────────────────── */
    #tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--tabbar-h);
      background: rgba(17,17,17,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-item .ti-icon { font-size: 22px; line-height: 1; }
    .tab-item .ti-label { font-size: 10px; color: var(--text2); font-weight: 500; letter-spacing: 0.3px; }
    .tab-item.active .ti-label { color: var(--accent); }
    .tab-item.active .ti-icon { filter: drop-shadow(0 0 6px var(--accent)); }

    /* ── Login screen ──────────────────────────────────────────────────────── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .login-logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-align: center;
    }
    .login-logo span { color: var(--accent); }
    .login-title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }
    .login-err {
      background: rgba(255,69,58,0.12);
      border: 1px solid rgba(255,69,58,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
    }

    /* ── Modal ─────────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      animation: fadeIn 0.2s ease;
    }
    .modal-overlay.center {
      align-items: center;
      padding: 24px;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-sheet {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      animation: slideUp 0.25s ease;
    }
    .modal-sheet.rounded { border-radius: 24px; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin: -8px auto 4px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
    }
    .modal-actions .btn { flex: 1; }

    /* ── Form sheet ────────────────────────────────────────────────────────── */
    .form-sheet {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: calc(var(--tabbar-h) + 16px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      align-items: center;
      width: 90%;
      max-width: 360px;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      animation: toastIn 0.25s ease, toastOut 0.25s ease 2.75s forwards;
      pointer-events: auto;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.success { background: var(--green); color: #000; }
    .toast.error   { background: var(--red); }
    .toast.info    { background: var(--card2); border: 1px solid var(--border2); }
    @keyframes toastIn  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; } }

    /* ── Divider ───────────────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* ── Confirm banner ────────────────────────────────────────────────────── */
    .confirm-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .confirm-item .ci-body { flex: 1; }
    .confirm-item .ci-title { font-size: 14px; font-weight: 600; }
    .confirm-item .ci-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* ── Dashboard ─────────────────────────────────────────────────────────── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .dash-tile {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }
    .dash-tile.wide { grid-column: span 2; }

    /* ── Order card ────────────────────────────────────────────────────────── */
    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .order-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .order-client { font-size: 16px; font-weight: 700; }
    .order-meta { font-size: 12px; color: var(--text2); }

    /* ── Hire calc box ─────────────────────────────────────────────────────── */
    .calc-box {
      background: var(--accent-dim);
      border: 1px solid var(--accent-mid);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .calc-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }
    .calc-row .cv { font-weight: 600; color: var(--accent); }

    /* ── Debt summary ──────────────────────────────────────────────────────── */
    .debt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .debt-row:last-child { border-bottom: none; }
    .debt-name { font-size: 15px; font-weight: 500; }
    .debt-amount { font-size: 15px; font-weight: 700; }
    .debt-amount.positive { color: var(--green); }
    .debt-amount.negative { color: var(--red); }

    /* ── Income / Expense record ───────────────────────────────────────────── */
    .rec-amount { font-size: 15px; font-weight: 700; }
    .rec-amount.plus  { color: var(--green); }
    .rec-amount.minus { color: var(--red); }

    /* ── Dispatch form tariff hint ─────────────────────────────────────────── */
    .tariff-hint {
      font-size: 13px;
      color: var(--accent);
      padding: 8px 12px;
      background: var(--accent-dim);
      border-radius: 8px;
    }

    /* ── Greeting ──────────────────────────────────────────────────────────── */
    .greeting {
      font-size: 24px;
      font-weight: 700;
      padding: 20px 20px 0;
    }

    /* ── Settings placeholder ──────────────────────────────────────────────── */
    .settings-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 64px 24px;
      color: var(--text2);
      font-size: 14px;
      text-align: center;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       DESKTOP LAYOUT  (≥ 768px)
       ══════════════════════════════════════════════════════════════════════════ */
    @media (min-width: 768px) {
      /* Hide mobile tab bar */
      #tabbar { display: none; }

      /* App becomes a flex row */
      #app {
        flex-direction: row;
        min-height: 100vh;
      }

      /* ── Sidebar ─────────────────────────────────────────────────────────── */
      #sidebar {
        width: var(--sidebar-w);
        min-width: var(--sidebar-w);
        background: var(--card);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 24px 0;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 100;
        overflow-y: auto;
      }

      .sb-logo {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.5px;
        padding: 0 20px 24px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
      }
      .sb-logo span { color: var(--accent); }

      .sb-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        cursor: pointer;
        color: var(--text2);
        font-size: 14px;
        font-weight: 500;
        transition: all 0.15s;
        border-radius: 0;
        position: relative;
      }
      .sb-item:hover { background: var(--card2); color: var(--text); }
      .sb-item.active {
        color: var(--accent);
        background: var(--accent-dim);
      }
      .sb-item .sb-icon { font-size: 18px; width: 24px; text-align: center; }
      .sb-item .sb-badge { margin-left: auto; }

      .sb-spacer { flex: 1; }
      .sb-bottom { padding: 16px 20px; border-top: 1px solid var(--border); }
      .sb-user { font-size: 13px; color: var(--text2); margin-bottom: 8px; }

      /* ── Main area ───────────────────────────────────────────────────────── */
      #main-area {
        margin-left: var(--sidebar-w);
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* ── Topbar ──────────────────────────────────────────────────────────── */
      #topbar {
        height: var(--topbar-h);
        background: rgba(17,17,17,0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 28px;
        gap: 20px;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .tb-title {
        font-size: 17px;
        font-weight: 700;
        flex: 1;
      }
      .tb-stat {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text2);
      }
      .tb-stat .tsv {
        font-weight: 700;
        color: var(--accent);
        font-size: 15px;
      }

      /* ── View on desktop ─────────────────────────────────────────────────── */
      .view {
        padding-bottom: 40px;
        max-width: 860px;
        margin: 0 auto;
        width: 100%;
      }

      /* Hide mobile navbar on desktop */
      .navbar { display: none; }

      /* Sub-tabs on desktop */
      .sub-tabs { padding: 0; }

      /* View content wider padding */
      .view-content { padding: 24px 28px; }

      /* Toast sits at bottom right on desktop */
      #toast-container {
        bottom: 24px;
        left: auto;
        right: 24px;
        transform: none;
        align-items: flex-end;
      }

      /* Modals always centered on desktop */
      .modal-overlay {
        align-items: center;
        padding: 24px;
      }
      .modal-sheet {
        border-radius: 24px;
        max-width: 520px;
      }
      .modal-handle { display: none; }

      /* Wider grids */
      .dash-grid { grid-template-columns: repeat(3, 1fr); }
      .dash-tile.wide { grid-column: span 3; }

      /* Bigger stat on desktop */
      .sc .val { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-spinner" id="init-spinner"></div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
