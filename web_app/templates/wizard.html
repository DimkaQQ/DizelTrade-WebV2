<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DizelTrade</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0c;--surface:#151515;--surface2:#1c1c1c;--border:#252525;
  --accent:#CCE01F;--accent2:#c94f1e;--text:#e4e4e4;--muted:#606060;
  --success:#3a9a5c;--rad:2px
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;
  display:flex;flex-direction:column}

header{background:var(--surface);border-bottom:2px solid var(--accent);
  padding:0 16px;flex-shrink:0;z-index:10}
.header-inner{max-width:480px;margin:0 auto;display:flex;align-items:center;
  justify-content:space-between;height:50px}
.logo{font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;
  letter-spacing:.08em;color:var(--accent);text-transform:uppercase;text-decoration:none}
.logo span{color:var(--muted);font-weight:400}
.header-right{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
  display:flex;align-items:center;gap:10px}
.back-link{color:var(--muted);text-decoration:none;font-size:11px;
  border:1px solid var(--border);padding:4px 10px;transition:all .15s}
.back-link:hover{color:var(--accent);border-color:var(--accent)}

.progress-wrap{background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 16px;flex-shrink:0}
.progress-inner{max-width:480px;margin:0 auto}
.progress-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .3s ease;border-radius:2px}
.progress-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);
  margin-top:6px;letter-spacing:.05em;display:flex;justify-content:space-between}

.steps-outer{flex:1;overflow:hidden;position:relative}
.steps-inner{max-width:480px;margin:0 auto;height:100%;position:relative}

.step{position:absolute;inset:0;padding:28px 16px 100px;overflow-y:auto;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transform:translateX(40px);
  transition:opacity .25s,transform .25s}
.step.active{opacity:1;pointer-events:all;transform:translateX(0)}
.step.exit-left{opacity:0;transform:translateX(-40px)}

.step-title{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;line-height:1.1}
.step-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
  margin-bottom:24px;letter-spacing:.04em}

.field{margin-bottom:0;flex:1;display:flex;flex-direction:column}
label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
input[type=text],input[type=number],input[type=password],textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:14px 16px;font-family:'IBM Plex Sans',sans-serif;
  font-size:18px;outline:none;border-radius:var(--rad);
  transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:none;height:90px;font-size:16px}

.hint{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
  margin-top:8px;line-height:1.5}

.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{
  padding:10px 16px;background:var(--surface2);border:1px solid var(--border);
  font-family:'IBM Plex Sans',sans-serif;font-size:14px;cursor:pointer;
  border-radius:var(--rad);transition:all .12s;user-select:none;color:var(--text)}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.selected{background:rgba(204,224,31,.12);border-color:var(--accent);color:var(--accent)}

.debt-list{display:flex;flex-direction:column;gap:6px}
.debt-item{
  padding:12px 14px;background:var(--surface2);
  border:1px solid var(--border);border-left:3px solid var(--accent2);
  cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  transition:all .12s
}
.debt-item:hover,.debt-item.selected{border-left-color:var(--accent);background:#1a1a1a}
.debt-item .name{font-size:15px}
.debt-item .amount{font-family:'IBM Plex Mono',monospace;font-size:14px;color:#f0836a}

.empty-state{
  color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px;
  padding:8px 0
}

.btn-row{position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(to top, var(--bg) 70%, transparent);
  padding:16px 16px 24px;z-index:20}
.btn-row-inner{max-width:480px;margin:0 auto;display:flex;gap:8px}

.btn{flex:1;padding:14px;border:none;cursor:pointer;
  font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  border-radius:var(--rad);transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px}
.btn-back{background:var(--surface2);color:var(--muted);border:1px solid var(--border);flex:0 0 52px;padding:14px 0}
.btn-back:hover{color:var(--text)}
.btn-next{background:var(--accent);color:#0c0c0c}
.btn-next:hover{filter:brightness(1.06)}
.btn-next:active{transform:scale(.98)}
.btn-next:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed}

#done-screen{display:none;position:fixed;inset:0;background:var(--bg);
  z-index:100;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;text-align:center}
#done-screen.show{display:flex}
.done-icon{font-size:64px;margin-bottom:20px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.done-title{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:8px}
.done-msg{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);
  margin-bottom:32px;line-height:1.6}
.done-btn{padding:14px 32px;background:var(--accent);color:#0c0c0c;border:none;
  font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  border-radius:var(--rad);margin-bottom:12px;width:100%;max-width:280px;
  transition:filter .15s}
.done-btn:hover{filter:brightness(1.06)}
.done-btn-sec{background:transparent;color:var(--muted);border:1px solid var(--border)}
.done-btn-sec:hover{color:var(--text);background:transparent}

.step-error{background:#1e0e08;border-left:3px solid var(--accent2);
  color:#e07a60;padding:10px 14px;font-family:'IBM Plex Mono',monospace;
  font-size:12px;margin-bottom:16px;display:none}
.step-error.show{display:block}

#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;align-items:center;justify-content:center}
#loading.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/menu" class="logo">Dizel<span>Trade</span></a>
    <div class="header-right">
      <span>{{ username }}</span>
      <a href="/menu" class="back-link">← меню</a>
    </div>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-inner">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label">
      <span id="progress-section">—</span>
      <span id="progress-count">1 / 1</span>
    </div>
  </div>
</div>

<div class="steps-outer">
  <div class="steps-inner" id="steps-container"></div>
</div>

<div class="btn-row">
  <div class="btn-row-inner">
    <button class="btn btn-back" id="btn-back" type="button">←</button>
    <button class="btn btn-next" id="btn-next" type="button">
      <span id="btn-next-text">Далее →</span>
    </button>
  </div>
</div>

<div id="done-screen">
  <div class="done-icon">✅</div>
  <div class="done-title">Записано!</div>
  <div class="done-msg" id="done-msg"></div>
  <button class="done-btn" onclick="location.href='/wizard/{{ section }}'">Новая запись</button>
  <button class="done-btn done-btn-sec" onclick="location.href='/menu'">В меню</button>
</div>

<div id="loading"><div class="spinner"></div></div>

<script>
const SECTION = {{ section | tojson }};
const MACHINES = {{ machines | tojson }};
const AUTO_FIELDS = {{ auto_fields | tojson }};
const ARTICLES = {{ articles | tojson }};
</script>

<script>
const WIZARDS = {
  auto: [
    {
      id: 'machine',
      title: 'Машина',
      sub: '// выберите транспортное средство',
      type: 'chips',
      field: 'machine',
      options: () => MACHINES,
      required: true
    },
    {
      id: 'field',
      title: 'Что записать?',
      sub: '// выберите тип записи',
      type: 'chips',
      field: 'field',
      options: () => AUTO_FIELDS,
      required: true
    },
    {
      id: 'value',
      title: 'Значение',
      sub: '// введите число',
      type: 'input_number',
      field: 'value',
      required: true,
      labelFn: (d) => d.field === 'Кол-во рейсов' ? 'Количество рейсов' : 'Сумма (₽)',
      intOnly: (d) => d.field === 'Кол-во рейсов'
    },
    {
      id: 'revenue',
      title: 'Выручка',
      sub: '// сумма за рейс',
      type: 'input_number',
      field: 'revenue',
      required: true,
      label: 'Выручка (₽)',
      condition: (d) => d.field === 'Кол-во рейсов'
    },
    {
      id: 'comment',
      title: 'Комментарий',
      sub: '// необязательно',
      type: 'textarea',
      field: 'comment',
      required: false,
      hint: '💡 Если хотите записать долг, то записывайте: долг "Имя Должника" и комментарий. Пример: долг "Лао" оплата позже'
    }
  ],

  hire: [
    {
      id: 'client',
      title: 'Заказчик',
      sub: '// кто заказал перевозку',
      type: 'input_text',
      field: 'client',
      required: true,
      label: 'Имя / название'
    },
    {
      id: 'supplier',
      title: 'Поставщик',
      sub: '// источник груза или топлива',
      type: 'input_text',
      field: 'supplier',
      required: false,
      label: 'Имя / название'
    },
    {
      id: 'carrier',
      title: 'Перевозчик',
      sub: '// кто везёт',
      type: 'input_text',
      field: 'carrier',
      required: true,
      label: 'Имя / название'
    },
    {
      id: 'volume',
      title: 'Объём',
      sub: '// м³ или тонны',
      type: 'input_number',
      field: 'volume',
      required: true,
      label: 'Объём (м³/т)'
    },
    {
      id: 'client_sum',
      title: 'Цена клиенту',
      sub: '// за литр',
      type: 'input_number',
      field: 'client_sum',
      required: true,
      label: 'Цена клиенту (₽/л)'
    },
    {
      id: 'fuel_cost',
      title: 'Цена поставщику',
      sub: '// за литр, необязательно',
      type: 'input_number',
      field: 'fuel_cost',
      required: false,
      label: 'Цена поставщику (₽/л)'
    },
    {
      id: 'carrier_cost',
      title: 'Цена перевозчику',
      sub: '// за литр',
      type: 'input_number',
      field: 'carrier_cost',
      required: true,
      label: 'Цена перевозчику (₽/л)'
    },
    {
      id: 'comment',
      title: 'Комментарий',
      sub: '// необязательно',
      type: 'textarea',
      field: 'comment',
      required: false
    }
  ],

  income: [
    {
      id: 'client',
      title: 'Заказчик',
      sub: '// от кого поступил доход',
      type: 'input_text',
      field: 'client',
      required: true,
      label: 'Имя / название'
    },
    {
      id: 'amount',
      title: 'Сумма',
      sub: '// размер дохода',
      type: 'input_number',
      field: 'amount',
      required: true,
      label: 'Сумма (₽)'
    },
    {
      id: 'comment',
      title: 'Комментарий',
      sub: '// необязательно',
      type: 'textarea',
      field: 'comment',
      required: false
    }
  ],

  expenses: [
    {
      id: 'article',
      title: 'Статья расхода',
      sub: '// выберите категорию',
      type: 'chips',
      field: 'article',
      options: () => ARTICLES,
      required: true
    },
    {
      id: 'amount',
      title: 'Сумма',
      sub: '// размер расхода',
      type: 'input_number',
      field: 'amount',
      required: true,
      label: 'Сумма (₽)'
    },
    {
      id: 'comment',
      title: 'Комментарий',
      sub: '// необязательно',
      type: 'textarea',
      field: 'comment',
      required: false
    }
  ],

  debt_payment: [
    {
      id: 'debtor',
      title: 'Должник',
      sub: '// выберите или введите имя',
      type: 'debt_list',
      field: 'debtor',
      required: true,
      label: 'Имя должника'
    },
    {
      id: 'amount',
      title: 'Сумма оплаты',
      sub: '// сколько оплатил',
      type: 'input_number',
      field: 'amount',
      required: true,
      label: 'Сумма (₽)'
    },
    {
      id: 'comment',
      title: 'Комментарий',
      sub: '// необязательно',
      type: 'textarea',
      field: 'comment',
      required: false
    }
  ]
};

const SECTION_NAMES = {
  auto: '🚛 Автопарк',
  hire: '📦 Найм',
  income: '💰 Доходы',
  expenses: '🧾 Расходы',
  debt_payment: '💸 Оплата долга'
};

let steps = [];
let currentStep = 0;
let data = {};
let debtBalances = {};

const container = document.getElementById('steps-container');
const progressFill = document.getElementById('progress-fill');
const progressSection = document.getElementById('progress-section');
const progressCount = document.getElementById('progress-count');
const btnBack = document.getElementById('btn-back');
const btnNext = document.getElementById('btn-next');
const btnNextText = document.getElementById('btn-next-text');

function escapeHtml(v){
  return String(v ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'", '&#039;');
}

function renderFatalError(msg){
  container.innerHTML = `
    <div class="step active">
      <div class="step-title">Ошибка</div>
      <div class="step-sub">${escapeHtml(msg)}</div>
    </div>
  `;
}

window.onerror = function(msg, src, line, col){
  renderFatalError(`JS ошибка: ${msg} (${line}:${col})`);
};

function getWizard(){
  return Array.isArray(WIZARDS[SECTION]) ? WIZARDS[SECTION] : null;
}

function getActiveSteps(){
  const wizard = getWizard();
  return wizard ? wizard.filter(s => !s.condition || s.condition(data)) : [];
}

async function fetchDebts(){
  try{
    const r = await fetch('/api/debts', { credentials: 'same-origin' });
    const j = await r.json();
    debtBalances = (j && !j.error) ? j : {};
  } catch(e){
    debtBalances = {};
  }
}

function updateProgress(){
  if(!steps.length){
    progressFill.style.width = '0%';
    progressCount.textContent = '—';
    return;
  }
  const pct = steps.length > 1 ? (currentStep / (steps.length - 1)) * 100 : 100;
  progressFill.style.width = pct + '%';
  progressCount.textContent = `${currentStep + 1} / ${steps.length}`;
}

function updateButtons(){
  btnBack.style.display = currentStep === 0 ? 'none' : 'flex';
  btnNextText.textContent = currentStep === steps.length - 1 ? 'Записать ✓' : 'Далее →';
}

function showError(msg){
  const el = document.getElementById('step-error');
  if(el){
    el.textContent = '⚠ ' + msg;
    el.classList.add('show');
  }
}

function clearError(){
  const el = document.getElementById('step-error');
  if(el) el.classList.remove('show');
}

function buildChips(step, currentVal){
  const opts = typeof step.options === 'function' ? step.options() : [];
  return `
    <div class="field">
      <label>${escapeHtml(step.label || 'Выберите')}</label>
      <div class="chips">
        ${opts.map((o, i) => `
          <div class="chip ${currentVal === o ? 'selected' : ''}" data-idx="${i}">
            ${escapeHtml(o)}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function buildDebtList(step, currentVal){
  const debtors = Object.entries(debtBalances).sort((a, b) => Number(b[1]) - Number(a[1]));
  const listHtml = debtors.length
    ? debtors.map(([name, amt]) => `
        <div class="debt-item ${currentVal === name ? 'selected' : ''}" data-name="${escapeHtml(name)}">
          <span class="name">${escapeHtml(name)}</span>
          <span class="amount">${Number(amt).toLocaleString('ru')} ₽</span>
        </div>
      `).join('')
    : `<div class="empty-state">Активных долгов нет</div>`;

  return `
    <div class="field">
      <label>${escapeHtml(step.label || 'Должник')}</label>
      <div class="debt-list">${listHtml}</div>
      <div style="margin-top:14px">
        <label>Или введите вручную</label>
        <input type="text" id="step-input" value="${escapeHtml(currentVal)}" placeholder="Имя должника">
      </div>
    </div>
  `;
}

function buildTextInput(step, currentVal){
  return `
    <div class="field">
      <label>${escapeHtml(step.label || 'Текст')}${step.required ? ' *' : ''}</label>
      <input type="text" id="step-input" value="${escapeHtml(currentVal)}">
    </div>
  `;
}

function buildNumberInput(step, currentVal){
  const isInt = step.intOnly && step.intOnly(data);
  const label = step.labelFn ? step.labelFn(data) : (step.label || 'Значение');
  return `
    <div class="field">
      <label>${escapeHtml(label)}${step.required ? ' *' : ''}</label>
      <input type="number" id="step-input" step="${isInt ? '1' : 'any'}" min="0" value="${escapeHtml(currentVal)}">
    </div>
  `;
}

function buildTextarea(step, currentVal){
  return `
    <div class="field">
      <label>${escapeHtml(step.label || 'Комментарий')}</label>
      <textarea id="step-input">${escapeHtml(currentVal)}</textarea>
      ${step.hint ? `<div class="hint">${escapeHtml(step.hint)}</div>` : ''}
    </div>
  `;
}

function attachEvents(step){
  const input = document.getElementById('step-input');

  if(input){
    input.addEventListener('input', () => {
      data[step.field] = input.value;
    });
  }

  if(step.type === 'chips'){
    const opts = typeof step.options === 'function' ? step.options() : [];
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        const value = opts[Number(chip.dataset.idx)];
        data[step.field] = value;
      });
    });
  }

  if(step.type === 'debt_list'){
    document.querySelectorAll('.debt-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.debt-item').forEach(d => d.classList.remove('selected'));
        item.classList.add('selected');
        const value = item.dataset.name || '';
        data[step.field] = value;
        const inp = document.getElementById('step-input');
        if(inp) inp.value = value;
      });
    });
  }

  setTimeout(() => {
    if(input && input.type !== 'hidden'){
      input.focus();
      if(input.value && input.select) input.select();
    }
  }, 200);
}

function renderStep(index){
  steps = getActiveSteps();

  if(!steps.length){
    renderFatalError(`Нет шагов для секции: ${SECTION}`);
    return;
  }

  currentStep = Math.max(0, Math.min(index, steps.length - 1));
  const step = steps[currentStep];

  updateProgress();
  updateButtons();
  progressSection.textContent = SECTION_NAMES[SECTION] || SECTION;

  const currentVal = data[step.field] || '';
  let inputHTML = '';

  if(step.type === 'chips') inputHTML = buildChips(step, currentVal);
  else if(step.type === 'debt_list') inputHTML = buildDebtList(step, currentVal);
  else if(step.type === 'input_text') inputHTML = buildTextInput(step, currentVal);
  else if(step.type === 'input_number') inputHTML = buildNumberInput(step, currentVal);
  else if(step.type === 'textarea') inputHTML = buildTextarea(step, currentVal);

  const old = container.querySelector('.step.active');
  if(old){
    old.classList.remove('active');
    old.classList.add('exit-left');
    setTimeout(() => old.remove(), 250);
  }

  const div = document.createElement('div');
  div.className = 'step active';
  div.innerHTML = `
    <div class="step-title">${escapeHtml(step.title)}</div>
    <div class="step-sub">${escapeHtml(step.sub)}</div>
    <div class="step-error" id="step-error"></div>
    ${inputHTML}
  `;
  container.appendChild(div);

  attachEvents(step);
}

function validate(){
  const step = steps[currentStep];
  const val = data[step.field];

  if(!step.required) return true;

  if(val === undefined || val === null || String(val).trim() === ''){
    showError('Заполните это поле');
    return false;
  }

  if(step.type === 'input_number'){
    const parsed = parseFloat(String(val).replace(',', '.'));
    if(Number.isNaN(parsed)){
      showError('Введите число');
      return false;
    }
  }

  return true;
}

async function submitData(){
  document.getElementById('loading').classList.add('show');

  try{
    const resp = await fetch('/api/wizard/save', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'same-origin',
      body:JSON.stringify({ section: SECTION, data: data })
    });

    const result = await resp.json();
    document.getElementById('loading').classList.remove('show');

    if(result.ok){
      document.getElementById('done-msg').textContent = result.message || 'Успешно сохранено';
      document.getElementById('done-screen').classList.add('show');
    } else {
      showError(result.error || 'Ошибка сохранения');
    }
  } catch(e){
    document.getElementById('loading').classList.remove('show');
    showError('Ошибка сети: ' + e.message);
  }
}

async function goNext(){
  clearError();

  const step = steps[currentStep];
  const input = document.getElementById('step-input');
  if(input && step && input.value !== undefined){
    data[step.field] = input.value;
  }

  if(!validate()) return;

  if(currentStep === steps.length - 1){
    await submitData();
  } else {
    renderStep(currentStep + 1);
  }
}

function goBack(){
  clearError();
  if(currentStep === 0){
    location.href = '/menu';
    return;
  }
  renderStep(currentStep - 1);
}

btnBack.addEventListener('click', goBack);
btnNext.addEventListener('click', goNext);

document.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    const step = steps[currentStep];
    if(step && step.type !== 'textarea'){
      e.preventDefault();
      goNext();
    }
  }
});

(async function init(){
  const wizard = getWizard();
  if(!wizard){
    renderFatalError(`Неизвестная секция: ${SECTION}`);
    return;
  }

  progressSection.textContent = SECTION_NAMES[SECTION] || SECTION;

  if(SECTION === 'debt_payment'){
    await fetchDebts();
  }

  steps = getActiveSteps();
  renderStep(0);
})();
</script>
</body>
